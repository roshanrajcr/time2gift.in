<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time2Gift — Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --pink:#e8579e;
    --pink-dark:#c23d80;
    --teal:#8fd6d1;
    --teal-dark:#5fb3ad;
    --cream:#fffaf6;
    --ink:#3a1f30;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Manrope', sans-serif;
    background:linear-gradient(180deg, #fff9fb 0%, var(--cream) 100%);
    color:var(--ink);
    overflow-x:hidden;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  .frame-border{
    position:fixed;
    inset:14px;
    border:1px solid rgba(232,87,158,0.3);
    pointer-events:none;
    z-index:5;
  }
  .frame-border::before{
    content:'';
    position:absolute;
    inset:6px;
    border:1px solid rgba(95,179,173,0.25);
  }

  .floaters{
    position:fixed;
    inset:0;
    overflow:hidden;
    pointer-events:none;
    z-index:1;
  }
  .floater{
    position:absolute;
    bottom:-80px;
    opacity:0;
    animation:drift linear infinite;
  }
  .floater svg{ width:100%; height:100%; display:block; }
  .floater:nth-child(1){ left:8%;  width:34px; height:34px; animation-duration:16s; animation-delay:0.5s; color:var(--pink); }
  .floater:nth-child(2){ left:22%; width:22px; height:22px; animation-duration:12s; animation-delay:3s;   color:var(--teal-dark); }
  .floater:nth-child(3){ left:78%; width:40px; height:40px; animation-duration:19s; animation-delay:1.2s; color:var(--pink-dark); }
  .floater:nth-child(4){ left:88%; width:26px; height:26px; animation-duration:14s; animation-delay:5s;   color:var(--teal); }
  .floater:nth-child(5){ left:50%; width:20px; height:20px; animation-duration:11s; animation-delay:2.4s; color:var(--pink); }
  .floater:nth-child(6){ left:65%; width:30px; height:30px; animation-duration:17s; animation-delay:7s;   color:var(--teal-dark); }

  @keyframes drift{
    0%   { transform:translateY(0) rotate(-8deg);   opacity:0; }
    10%  { opacity:0.35; }
    50%  { transform:translateY(-52vh) rotate(10deg); opacity:0.22; }
    90%  { opacity:0.3; }
    100% { transform:translateY(-104vh) rotate(-6deg); opacity:0; }
  }

  @media (prefers-reduced-motion: reduce){
    .floater{ animation:none; opacity:0 !important; }
  }

  main{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:40px 24px;
    position:relative;
    z-index:2;
  }

  .logo{
    width:104px;
    height:104px;
    border-radius:50%;
    margin-bottom:20px;
    box-shadow:0 8px 24px rgba(232,87,158,0.28);
    opacity:0;
    animation:fadeUp 0.8s ease 0s forwards, popIn 0.7s ease 0s forwards;
  }
  @keyframes popIn{
    0%{ transform:scale(0.8); }
    60%{ transform:scale(1.05); }
    100%{ transform:scale(1); }
  }

  .eyebrow{
    font-size:12px;
    letter-spacing:0.28em;
    text-transform:uppercase;
    color:var(--teal-dark);
    font-weight:700;
    margin-bottom:22px;
    opacity:0;
    animation:fadeUp 0.8s ease forwards;
  }

  h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:clamp(2.6rem, 8vw, 5.2rem);
    line-height:1.02;
    letter-spacing:-0.01em;
    opacity:0;
    animation:fadeUp 0.8s ease 0.15s forwards;
    background:linear-gradient(100deg, var(--pink-dark) 40%, var(--teal-dark) 50%, var(--pink-dark) 60%);
    background-size:250% 100%;
    background-position:100% 0;
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    animation:fadeUp 0.8s ease 0.15s forwards, shimmer 3.5s ease 1.4s 1;
  }

  h1 .dot{ color:var(--teal-dark); -webkit-text-fill-color:var(--teal-dark); }

  @keyframes shimmer{
    0%   { background-position:120% 0; }
    100% { background-position:-20% 0; }
  }

  .tagline{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-weight:300;
    font-size:clamp(1rem, 2.4vw, 1.35rem);
    color:var(--pink-dark);
    margin-top:18px;
    opacity:0;
    animation:fadeUp 0.8s ease 0.3s forwards;
  }

  .desc{
    max-width:440px;
    margin-top:26px;
    font-size:15px;
    line-height:1.7;
    color:#7a5a6d;
    opacity:0;
    animation:fadeUp 0.8s ease 0.45s forwards;
  }

  .progress-wrap{
    margin-top:38px;
    width:min(320px, 70vw);
    opacity:0;
    animation:fadeUp 0.8s ease 0.6s forwards;
  }
  .progress-track{
    height:2px;
    background:rgba(232,87,158,0.15);
    border-radius:2px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg, var(--pink), var(--teal-dark));
    animation:fill 2.4s ease 1s forwards;
  }
  .progress-label{
    margin-top:10px;
    font-size:11px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:#b48ba3;
  }

  .social{
    margin-top:44px;
    display:flex;
    gap:16px;
    align-items:center;
    opacity:0;
    animation:fadeUp 0.8s ease 0.75s forwards;
  }
  .social a{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:11px 22px;
    border-radius:999px;
    background:var(--pink-dark);
    color:var(--cream);
    text-decoration:none;
    font-size:13.5px;
    font-weight:500;
    letter-spacing:0.02em;
    transition:transform 0.25s ease, background 0.25s ease;
  }
  .social a:hover{
    background:var(--teal-dark);
    transform:translateY(-2px);
  }
  .social a:focus-visible{
    outline:2px solid var(--teal-dark);
    outline-offset:3px;
  }
  .social svg{ width:16px; height:16px; }

  footer{
    text-align:center;
    padding:20px;
    font-size:11.5px;
    letter-spacing:0.06em;
    color:#c7a6ba;
  }

  @keyframes fadeUp{
    from{ opacity:0; transform:translateY(14px); }
    to{ opacity:1; transform:translateY(0); }
  }
  @keyframes fill{
    from{ width:0%; }
    to{ width:64%; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.01ms !important; animation-iteration-count:1 !important; }
  }
</style>
</head>
<body>
  <div class="frame-border"></div>
  <div class="floaters" aria-hidden="true">
    <span class="floater"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="2"/><rect x="6.5" y="6.5" width="11" height="11" rx="1"/></svg></span>
    <span class="floater"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="2"/><rect x="6.5" y="6.5" width="11" height="11" rx="1"/></svg></span>
    <span class="floater"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="2"/><rect x="6.5" y="6.5" width="11" height="11" rx="1"/></svg></span>
    <span class="floater"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="2"/><rect x="6.5" y="6.5" width="11" height="11" rx="1"/></svg></span>
    <span class="floater"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="2"/><rect x="6.5" y="6.5" width="11" height="11" rx="1"/></svg></span>
    <span class="floater"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="2"/><rect x="6.5" y="6.5" width="11" height="11" rx="1"/></svg></span>
  </div>
  <main>
    <img class="logo" src="assets/time2gift-logo.jpg" alt="Time2Gift logo">
    <p class="eyebrow">Time2Gift</p>
    <h1>Framing your<br>best moments<span class="dot">.</span></h1>
    <p class="tagline">everyone loves a surprise</p>
    <p class="desc">Personalised photo frames &amp; gifts for the people who matter — the website is on its way. Till then, find us and place your orders right here.</p>

    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill"></div></div>
      <p class="progress-label">Coming Soon</p>
    </div>

    <div class="social">
      <a href="https://www.instagram.com/_time2gift_" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1"/></svg>
        Instagram
      </a>
    </div>
  </main>
  <footer>&copy; 2026 Time2Gift · time2gift.in</footer>
</body>
</html>
